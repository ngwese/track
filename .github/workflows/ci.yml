name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  markdown:
    name: Markdown
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Check markdown formatting
        run: |
          if git grep -nI -E '[[:blank:]]+$' -- '*.md'; then
            echo "Trailing whitespace found in markdown files"
            exit 1
          fi

      - name: Lint markdown
        run: npx --yes markdownlint-cli2@0.22.1 "**/*.md"

  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      - name: Lint Rust
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace

  change-risk:
    name: Change risk (CRAP)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect Rust-related changes
        uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            rust:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - '.cargo-crap.toml'
              - 'crap_baseline.json'
              - '.github/workflows/ci.yml'

      - name: Install Rust toolchain
        if: steps.changes.outputs.rust == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0

      - name: Cache cargo
        if: steps.changes.outputs.rust == 'true'
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        if: steps.changes.outputs.rust == 'true'
        uses: taiki-e/install-action@cargo-llvm-cov
        with:
          tool: cargo-llvm-cov@0.8.7

      - name: Install cargo-crap
        if: steps.changes.outputs.rust == 'true'
        run: cargo install cargo-crap --locked --version 0.2.2

      - name: Generate LCOV
        if: steps.changes.outputs.rust == 'true'
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info

      - name: CRAP summary
        if: steps.changes.outputs.rust == 'true'
        run: cargo crap --workspace --lcov lcov.info --summary

      - name: Check CRAP regression
        if: steps.changes.outputs.rust == 'true'
        run: cargo crap --workspace --lcov lcov.info --baseline crap_baseline.json

      - name: Generate PR comment
        if: steps.changes.outputs.rust == 'true' && github.event_name == 'pull_request'
        run: |
          cargo crap --workspace --lcov lcov.info \
            --baseline crap_baseline.json \
            --format pr-comment --output crap-comment.md

      - name: Post or update PR comment
        if: steps.changes.outputs.rust == 'true' && github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('crap-comment.md', 'utf8');
            const marker = '<!-- cargo-crap-report -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body?.startsWith(marker));
            const args = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            };
            if (existing) {
              await github.rest.issues.updateComment({
                ...args,
                comment_id: existing.id,
              });
            } else {
              await github.rest.issues.createComment({
                ...args,
                issue_number: context.issue.number,
              });
            }

  tlc-hub-sync:
    name: TLC hub sync
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect TLA-related changes
        uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            tla:
              - 'spec/tla/**'
              - 'docs/adr/0004-hub-sync-protocol-and-compaction.md'
              - 'docs/adr/0006-formal-verification-hub-sync-tlaplus.md'
              - '.github/workflows/ci.yml'

      - name: Setup Java
        if: steps.changes.outputs.tla == 'true'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      # Pinned release: https://github.com/tlaplus/tlaplus/releases/tag/v1.8.0
      - name: Download TLC
        if: steps.changes.outputs.tla == 'true'
        run: |
          curl -fsSL -o /tmp/tla2tools.jar \
            https://github.com/tlaplus/tlaplus/releases/download/v1.8.0/tla2tools.jar

      - name: Model check
        if: steps.changes.outputs.tla == 'true'
        working-directory: spec/tla
        env:
          TLA_TOOLS_JAR: /tmp/tla2tools.jar
        run: ./run-tlc.sh
