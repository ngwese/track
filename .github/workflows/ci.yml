name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  markdown:
    name: Markdown
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check markdown formatting
        run: |
          if git grep -nI -E '[[:blank:]]+$' -- '*.md'; then
            echo "Trailing whitespace found in markdown files"
            exit 1
          fi

      - name: Lint markdown
        run: npx --yes markdownlint-cli2@0.22.1 "**/*.md"

  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      - name: Lint Rust
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace

  tlc-hub-sync:
    name: TLC hub sync
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect TLA-related changes
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            tla:
              - 'spec/tla/**'
              - 'docs/adr/0004-hub-sync-protocol-and-compaction.md'
              - 'docs/adr/0006-formal-verification-hub-sync-tlaplus.md'
              - '.github/workflows/ci.yml'

      - name: Setup Java
        if: steps.changes.outputs.tla == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Pinned release: https://github.com/tlaplus/tlaplus/releases/tag/v1.8.0
      - name: Download TLC
        if: steps.changes.outputs.tla == 'true'
        run: |
          curl -fsSL -o /tmp/tla2tools.jar \
            https://github.com/tlaplus/tlaplus/releases/download/v1.8.0/tla2tools.jar

      - name: Model check
        if: steps.changes.outputs.tla == 'true'
        working-directory: spec/tla
        env:
          TLA_TOOLS_JAR: /tmp/tla2tools.jar
        run: ./run-tlc.sh
